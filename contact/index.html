<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact – Instituut voor Toegepaste Filosofie</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; line-height: 1.6; margin: 0; }
    header, main, footer { max-width: 900px; margin: 0 auto; padding: 24px; }
    header a { text-decoration: none; }
    h1 { margin-top: 0; }
    form { display: grid; gap: 14px; max-width: 520px; }
    label { display: grid; gap: 6px; }
    input, select, textarea, button { font: inherit; padding: 10px 12px; }
    button { cursor: pointer; }
    .note { margin-top: 24px; }
  </style>
</head>
<body>

<header>
  <a href="/">← Home</a>
  <h1>Contact</h1>
</header>

<main>
<main class="grid">

  <section class="card">
    <h2>Bericht sturen</h2>

    <form action="https://formspree.io/f/JE_EIGEN_CODE" method="POST">
      <label>Naam*
        <input type="text" name="naam" required>
      </label>

      <label>E-mail*
        <input type="email" name="email" required>
      </label>

      <label>Onderwerp
        <input type="text" name="onderwerp">
      </label>

      <label>Bericht*
        <textarea name="bericht" required></textarea>
      </label>

      <!-- anti-spam -->
      <input type="text" name="_gotcha" style="display:none">

      <button type="submit">Verzenden</button>
      <small>Door te verzenden ga je akkoord dat we je gegevens gebruiken om te reageren op je bericht.</small>
    </form>
  </section>
</main>

<footer>
  <small>© Instituut voor Toegepaste Filosofie</small>
</footer>

</body>
</html>

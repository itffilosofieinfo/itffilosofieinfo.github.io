<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inschrijven – Instituut voor Toegepaste Filosofie</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; line-height: 1.6; margin: 0; }
    header, main, footer { max-width: 900px; margin: 0 auto; padding: 24px; }
    header a { text-decoration: none; }
    h1 { margin-top: 0; }
    form { display: grid; gap: 14px; max-width: 520px; }
    label { display: grid; gap: 6px; }
    input, select, textarea, button { font: inherit; padding: 10px 12px; }
    button { cursor: pointer; }
    .note { margin-top: 24px; }
  </style>
</head>
<body>

<header>
  <a href="/">← Home</a>
  <h1>Inschrijven</h1>
</header>

<main>
  <p>Via onderstaand formulier kun je je inschrijven. Lees ook onze voorwaarden door.</p>

  <form action="https://formspree.io/f/mykggovy" method="POST">
    <label>Naam* <input type="text" name="naam" required></label>
    <label>E-mail* <input type="email" name="email" required></label>
    <label>Telefoonnummer <input type="tel" name="telefoon"></label>

    <label>Ik schrijf me in voor
      <select name="inschrijving">
        <option value="">Selecteer</option>
        <option value="PEP training">PEP training</option>
        <option value="Masterclass Toegepaste Filosofie">Masterclass Toegepaste Filosofie</option>
      </select>
    </label>

    <label>Ik ben
      <select name="status">
        <option value="">Selecteer</option>
        <option value="Student van de HTF">Student van de HTF</option>
        <option value="Geen student van de HTF">Geen student van de HTF</option>
      </select>
    </label>

    <label>Hoe heb je over ons gehoord?
      <select name="bron">
        <option value="">Selecteer</option>
        <option value="Zoekmachine">Zoekmachine</option>
        <option value="Social Media">Social Media</option>
        <option value="Vriend of familie">Vriend of familie</option>
        <option value="Via de HTF">Via de HTF</option>
      </select>
    </label>

    <label>Opmerkingen of vragen
      <textarea name="bericht" rows="5"></textarea>
    </label>

    <button type="submit">Verzenden</button>
  </form>

  <div class="note">
    <h2>Voorwaarden</h2>
    <p><a href="/assets/Voorwaarden-ITF.pdf" target="_blank" rel="noopener">Voorwaarden-ITF (PDF)</a></p>
  </div>
</main>

<footer>
  <small>© Instituut voor Toegepaste Filosofie</small>
</footer>

</body>
</html>
